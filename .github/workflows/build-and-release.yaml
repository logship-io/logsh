on:
  push:
    tags: ['v*.*.*']
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Logsh CLI Build and Release

jobs:
  quality:
    name: Quality (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logsh
          cache-all-crates: true
      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: ./logsh
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: ./logsh
      - name: Tests
        run: cargo test
        working-directory: ./logsh

  build:
    needs: quality
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          # Linux x86_64 musl (static, for containers)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
            container_arch: amd64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          # Linux aarch64 musl (static, for containers)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
            container_arch: arm64
          # Linux ARMv7 (Raspberry Pi etc)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
          # Linux ARMv7 musl (static, for containers)
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            cross: true
            container_arch: arm
          # Linux ARM (older 32-bit ARM)
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            cross: true
          # macOS Intel
          - os: macos-15
            target: x86_64-apple-darwin
            cross: false
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cross: false
          # FreeBSD x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.1")
            VERSION="${BASE}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "Injecting version: $VERSION"
          for toml in ./logsh/Cargo.toml ./logsh/logsh-core/Cargo.toml ./logsh/logsht/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$toml"
          done

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logsh
          key: ${{ matrix.target }}
          cache-all-crates: true

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --workspace --release --target ${{ matrix.target }}
        working-directory: ./logsh

      - name: Build (cross)
        if: matrix.cross
        run: cross build --workspace --release --target ${{ matrix.target }}
        working-directory: ./logsh

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          $target = "${{ matrix.target }}"
          $releaseDir = "logsh/target/$target/release"
          if ("${{ matrix.os }}" -eq "windows-latest") {
            $ext = ".exe"
          } else {
            $ext = ""
          }
          foreach ($bin in @("logsh", "logsht")) {
            $binaryPath = "$releaseDir/$bin$ext"
            if (Test-Path $binaryPath) {
              Copy-Item $binaryPath "artifacts/$bin-$target$ext"
            }
          }

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: logsh-cli-${{ matrix.target }}
          path: artifacts/

  prerelease:
    name: Create pre-release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [build, container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Determine pre-release version
        id: version
        run: |
          base=$(git describe --tags --abbrev=0 | sed 's/^v//')
          tag="v${base}-dev.${GITHUB_RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Pre-release tag: $tag"

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: logsh-cli-*
          merge-multiple: true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          cat > notes.md <<EOF
          Automated pre-release from commit ${{ github.sha }}

          ## Container Images

          \`\`\`
          docker pull ghcr.io/${{ github.repository }}:latest-pre
          docker pull ghcr.io/${{ github.repository }}/logsht:latest-pre
          \`\`\`
          EOF
          gh release create "$tag" artifacts/* \
            --prerelease \
            --title "Development Build ($tag)" \
            -F notes.md

  container:
    name: Container (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - image: logsh
            file: ./build/Containerfile.logsh
            suffix: ""
          - image: logsht
            file: ./build/Containerfile.logsht
            suffix: /logsht
    steps:
      - uses: actions/checkout@v4

      - name: Download musl artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          pattern: logsh-cli-*musl*
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest-pre,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Export OCI tar
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          outputs: type=oci,dest=${{ matrix.image }}-oci.tar

      - name: Upload OCI image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-oci
          path: ${{ matrix.image }}-oci.tar

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: logsh-cli-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${{ github.ref_name }}"
          version_bare="${version#v}"
          cat > notes.md <<EOF
          ## Container Images

          \`\`\`
          docker pull ghcr.io/${{ github.repository }}:${version_bare}
          docker pull ghcr.io/${{ github.repository }}/logsht:${version_bare}
          \`\`\`
          EOF
          gh release create "$version" artifacts/* \
            --generate-notes \
            --title "$version" \
            --notes-file notes.md