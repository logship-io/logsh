on:
  push:
    tags: ['v*.*.*']
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Logsh CLI Build and Release

jobs:
  quality:
    name: Quality (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logsh
          cache-all-crates: true
      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: ./logsh
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: ./logsh
      - name: Tests
        run: cargo test
        working-directory: ./logsh

  build:
    needs: quality
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          # Linux x86_64 musl (static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          # Linux aarch64 musl (static)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          # Linux ARMv7 (Raspberry Pi etc)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
          # Linux ARM (older 32-bit ARM)
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            cross: true
          # macOS Intel
          - os: macos-15
            target: x86_64-apple-darwin
            cross: false
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cross: false
          # FreeBSD x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $Env:GIT_VERSION = $Env:GITHUB_REF -replace 'refs/.*/v', ''
          foreach ($toml in @("./logsh/Cargo.toml", "./logsh/logsht/Cargo.toml")) {
            (Get-Content $toml) -replace '^version\s+=\s+"([0-9\.]+)"\s*$', "version = `"$($Env:GIT_VERSION)`"" | Out-File $toml
          }
          echo "Version should be $($Env:GIT_VERSION)"
          echo "----------------------------------------"
          cat ./logsh/Cargo.toml
          cat ./logsh/logsht/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logsh
          key: ${{ matrix.target }}
          cache-all-crates: true

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ./logsh

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
        working-directory: ./logsh

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          $target = "${{ matrix.target }}"
          $releaseDir = "logsh/target/$target/release"
          if ("${{ matrix.os }}" -eq "windows-latest") {
            $ext = ".exe"
          } else {
            $ext = ""
          }
          foreach ($bin in @("logsh", "logsht")) {
            $binaryPath = "$releaseDir/$bin$ext"
            if (Test-Path $binaryPath) {
              Copy-Item $binaryPath "artifacts/$bin-$target$ext"
            }
          }

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: logsh-cli-${{ matrix.target }}
          path: artifacts/

  prerelease:
    name: Create pre-release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create pre-release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest-pre"
          prerelease: true
          title: "Development Build"
          files: |
            artifacts/**/*

  container:
    name: Container (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        include:
          - image: logsh
            file: ./Containerfile
            suffix: ""
          - image: logsht
            file: ./Containerfile.logsht
            suffix: /logsht
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest-pre,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Inject Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $Env:GIT_VERSION = $Env:GITHUB_REF -replace 'refs/.*/v', ''
          foreach ($toml in @("./logsh/Cargo.toml", "./logsh/logsht/Cargo.toml")) {
            (Get-Content $toml) -replace '^version\s+=\s+"([0-9\.]+)"\s*$', "version = `"$($Env:GIT_VERSION)`"" | Out-File $toml
          }
          echo "Version should be $($Env:GIT_VERSION)"
          echo "----------------------------------------"
          cat ./logsh/Cargo.toml
          cat ./logsh/logsht/Cargo.toml

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true